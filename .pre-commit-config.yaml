ci:
  autofix_prs: false

repos:
  - repo: https://github.com/psf/black-pre-commit-mirror
    rev: 26.3.1
    hooks:
      - id: black
        args:
          - --config=pyproject.toml

  - repo: https://github.com/PyCQA/flake8
    rev: 7.3.0
    hooks:
      - id: flake8
        language_version: python3
        args:
          - --config=.flake8

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        args: 
          - --settings-path=pyproject.toml

  - repo: https://github.com/codespell-project/codespell
    rev: v2.4.2
    hooks:
      - id: codespell
        additional_dependencies:
          - tomli
        args: 
          - --toml=pyproject.toml

  # pre-commit runs in an isolated environment by default, so typed dependencies must be added explicitly
  # to ensure that dynamic type checking behaves the same as mypy installed locally
  # see https://github.com/pre-commit/pre-commit/issues/1580#issuecomment-679413936
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic
          - typer
        args:
          - --config-file=pyproject.toml
